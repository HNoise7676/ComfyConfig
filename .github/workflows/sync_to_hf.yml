name: Sync to Hugging Face
on:
  push:
    branches: [main]
    paths:
      - 'index.html'
      - 'tags.csv'
  workflow_dispatch:

jobs:
  sync-to-hf:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # 1. Setup git identity
          git config --global user.email "bot@github.com"
          git config --global user.name "GitHub Action Bot"
          
          # 2. Create a temporary folder and force the branch name to 'main'
          mkdir hf_space
          cd hf_space
          git init -b main
          
          # 3. Connect and Pull
          git remote add origin https://HNoise7676:$HF_TOKEN@huggingface.co/spaces/HNoise7676/Prompt_Writer
          git pull origin main --depth=1

          # 4. Copy the new files
          cp ../index.html .
          cp ../tags.csv .

          # 5. Commit and Push
          git add index.html tags.csv
          if git diff-index --quiet HEAD; then
            echo "No changes to sync."
          else
            git commit -m "Sync index.html and tags.csv from GitHub"
            git push origin main
          fi