name: Sync to Hugging Face
on:
  push:
    branches: [main]
    paths:
      - 'index.html'
      - 'tags.csv'
  workflow_dispatch:

jobs:
  sync-files:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Upload Files to HF
        run: |
          # Function to upload a file to HF via the Commit API
          upload_to_hf() {
            FILE=$1
            CONTENT=$(base64 -w 0 $FILE)
            
            curl -i -X POST \
              -H "Authorization: Bearer ${{ secrets.HF_TOKEN }}" \
              -H "Content-Type: application/json" \
              -d "{
                \"summary\": \"Sync $FILE from GitHub\",
                \"operations\": [
                  {
                    \"action\": \"create\",
                    \"path\": \"$FILE\",
                    \"content\": \"$CONTENT\"
                  }
                ]
              }" \
              "https://huggingface.co/api/spaces/HNoise7676/Prompt_Writer/commit/main"
          }

          echo "Uploading index.html..."
          upload_to_hf "index.html"
          
          echo "Uploading tags.csv..."
          upload_to_hf "tags.csv"